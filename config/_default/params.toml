# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon = "/favicon.png"

[footer]
since = 2022
customText = "用心记录每一段技术成长 · Powered by Hugo & Stack"

[dateFormat]
published = "Jan 02, 2006"
lastUpdated = "Jan 02, 2006 15:04 MST"

[sidebar]
emoji = "🍥"
subtitle = "目前人在上海，20年毕业，普通muggle，java开发。邮箱：hanyongfa2013@163.com 。"
avatar = "img/avatar.png"

[article]
headingAnchor = true
math = false
readingTime = true

[article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

## Widgets
[[widgets.homepage]]
type = "search"

